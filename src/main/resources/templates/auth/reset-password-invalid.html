<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>NewsSphere — Invalid Link</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"/>
    <link rel="stylesheet" th:href="@{/css/auth.css}"/>
</head>
<body>

<div class="auth-layout">
    <div class="left-panel">
        <div class="left-bg-circle" style="width:300px;height:300px;top:-80px;right:-80px"></div>
        <div class="left-bg-circle" style="width:200px;height:200px;bottom:-60px;left:-60px"></div>
        <div class="brand">
            <div class="brand-icon"><i class="ti ti-radio" aria-hidden="true"></i></div>
            <span class="brand-name">News<span class="brand-sphere">Sphere</span></span>
        </div>
        <div class="left-content">
            <div class="left-tagline">Your world,<br><span>curated by AI.</span></div>
            <div class="left-desc">Stay ahead with personalized news summaries from trusted global sources — delivered in real time.</div>
        </div>
        <div class="left-footer">© 2025 NewsSphere. All rights reserved.</div>
    </div>

    <div class="right-panel">
        <div class="form-card" style="text-align:center;">

            <div style="width:56px;height:56px;background:#FEF2F2;border-radius:50%;
                        display:flex;align-items:center;justify-content:center;margin:0 auto 20px;">
                <i class="ti ti-link-off" style="font-size:24px;color:#EF4444;"></i>
            </div>

            <div class="form-title" style="margin-bottom:8px;">Link expired</div>
            <div class="form-subtitle" style="margin-bottom:24px;"
                 th:text="${errorMsg} ?: 'This reset link has expired or is invalid. Please request a new one.'">
            </div>

            <a th:href="@{/auth/forgot-password}" class="submit-btn"
               style="display:block;text-decoration:none;text-align:center;">
                Request new link
            </a>

            <a th:href="@{/auth/login}"
               style="display:block;margin-top:14px;font-size:13px;
                      color:var(--color-text-secondary);text-decoration:none;">
                Back to Sign in
            </a>
        </div>
    </div>
</div>

</body>
</html>
